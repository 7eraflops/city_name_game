name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller city_name_game.spec

      - name: Package release zip
        run: |
          mkdir city_name_game
          copy dist\city_name_game.exe city_name_game\
          copy cities.txt city_name_game\
          powershell Compress-Archive -Path city_name_game -DestinationPath city_name_game.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: city_name_game
          path: city_name_game.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: city_name_game.zip
          generate_release_notes: true
